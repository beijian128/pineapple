
syntax = "proto3";

package common;

option go_package = "./api/pb";

message Empty {
}

message Response {
  int32 code = 1;
  string message = 2;
  bytes data = 3;
}

message Heartbeat {
  int64 timestamp = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  int32 code = 1;
  string message = 2;
  string token = 3;
  int64 user_id = 4;
}
